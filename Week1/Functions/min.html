<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Min</title>
</head>
<body>
    <script>
        let a = +prompt("a?", 0)
        let b = +prompt("b?", 0)
        
        alert(min(a,b))

        function min(a, b) {
            if (a < b) {
                return a
            } else {
                return b
            }
        }

    </script>
</body>
</html>
