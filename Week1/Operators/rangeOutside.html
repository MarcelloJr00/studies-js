<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check the range outside</title>
</head>
<body>
    <script>
        let age = prompt("What is your age?", 0)

        if (age < 14 || age > 90) {
            alert("Okay! :)")
        } else {
            alert("Not Okay! :(")
        }
        
        if (!(age >= 14 && age <= 90)) {
            alert("Okay! :)")
        } else {
            alert("Not Okay! :(")
        }

    </script>
</body>
</html>
